name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  zsh:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no private*.zsh files tracked
        run: |
          if git ls-files | grep -qE 'private[^/]*\.zsh$'; then
            echo "ERROR: private*.zsh files must not be committed:"
            git ls-files | grep -E 'private[^/]*\.zsh$'
            exit 1
          fi
          echo "OK: no private*.zsh tracked"

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Lint with ShellCheck
        run: |
          find . -name '*.zsh' -not -path './.worktrees/*' -print0 |
            xargs -0 shellcheck --severity=warning

      - name: Syntax check (zsh -n)
        run: |
          find . -name '*.zsh' -not -path './.worktrees/*' -print0 |
            while IFS= read -r -d '' f; do
              zsh -n "$f" || { echo "FAIL: $f"; exit 1; }
              echo "OK: $f"
            done

      - name: Test make install
        run: make install
